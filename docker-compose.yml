services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kanban_test
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["test"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kanban:kanban@db:5432/kanban
      JWT_SECRET: ${JWT_SECRET:-boardflow-dev-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-boardflow-refresh-secret-change-in-prod}
      WEB_ORIGIN: http://localhost:3000
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    environment:
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kanban:kanban@db-test:5432/kanban_test
      JWT_SECRET: test-jwt-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      NODE_ENV: test
    command: >
      sh -c "
        cd /app/apps/api &&
        npx prisma migrate deploy &&
        npx vitest run
      "
    profiles: ["test"]

volumes:
  postgres_data:
